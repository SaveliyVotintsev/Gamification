<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="apple-touch-icon" href="./apple-touch-icon.svg">
  <title>Геймификация — тренажёр</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
</head>
<body>
  <div class="toolbar">
    <button id="btn-qr" class="toolbar-btn" aria-label="QR-код сайта">
      <img src="./icons/qr.svg" class="toolbar-icon" alt="">
    </button>
    <button id="theme-toggle" class="toolbar-btn" aria-label="Переключить тему">🌙</button>
  </div>

  <!-- QR-модалка -->
  <div id="qr-overlay" class="qr-overlay hidden">
    <div class="qr-modal">
      <h3 class="qr-title">Поделиться</h3>
      <canvas id="qr-canvas"></canvas>
      <p id="qr-url" class="qr-url"></p>
      <button id="btn-qr-close" class="btn-secondary">Закрыть</button>
    </div>
  </div>

  <main class="container">
    <!-- Стартовый экран -->
    <section id="screen-start" class="screen">
      <h1>Геймификация — тренажёр</h1>
      <p class="subtitle">Выберите набор вопросов:</p>

      <div class="pack-options">
        <label class="pack-option">
          <input type="radio" name="pack" value="multiple_choice" checked>
          <span>Тестовые (<span id="count-mc">…</span>)</span>
        </label>
        <label class="pack-option">
          <input type="radio" name="pack" value="open">
          <span>Открытые (<span id="count-open">…</span>)</span>
        </label>
        <label class="pack-option">
          <input type="radio" name="pack" value="all">
          <span>Все (<span id="count-all">…</span>)</span>
        </label>
        <label class="pack-option">
          <input type="radio" name="pack" value="exam">
          <span>Тест (20 случайных)</span>
        </label>
        <label class="pack-option">
          <input type="radio" name="pack" value="browse">
          <span>Просмотр ответов</span>
        </label>
      </div>

      <button id="btn-start" class="btn-primary">Начать</button>
      <p id="load-error" class="error hidden"></p>
    </section>

    <!-- Экран вопроса -->
    <section id="screen-question" class="screen hidden">
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      <p class="counter"><span id="current-num">1</span> / <span id="total-num">20</span></p>
      <h2 id="question-text" class="question-text"></h2>
      <div id="options-list" class="options-list"></div>
      <div id="open-answer-area" class="open-answer-area hidden">
        <input type="text" id="open-input" class="open-input" autocomplete="off" placeholder="Введите ответ…">
        <button id="btn-submit-answer" class="btn-primary btn-submit">Ответить</button>
        <div id="open-feedback" class="open-feedback"></div>
      </div>
      <div id="note-block" class="note-block hidden"></div>
      <button id="btn-next" class="btn-primary hidden">Дальше</button>
    </section>

    <!-- Экран просмотра -->
    <section id="screen-browse" class="screen hidden">
      <h2>Все вопросы и ответы</h2>
      <div id="browse-list" class="browse-list"></div>
      <button id="btn-browse-back" class="btn-secondary">Назад</button>
    </section>

    <!-- Экран итогов -->
    <section id="screen-results" class="screen hidden">
      <h2>Результаты</h2>
      <p class="score">Правильно: <span id="score-correct">0</span> из <span id="score-total">0</span> (<span id="score-pct">0%</span>)</p>
      <div id="mistakes-list" class="mistakes-list"></div>
      <div class="results-actions">
        <button id="btn-retry" class="btn-primary" disabled>Повторить только ошибки</button>
        <button id="btn-new-session" class="btn-secondary">Новая сессия</button>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
